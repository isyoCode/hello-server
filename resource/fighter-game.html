<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>🥊 拳王格斗</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #0a0a0f; font-family: 'Arial Black', sans-serif; }
    #loading { position: fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff0; font-size:2.5rem; text-shadow:0 0 20px #ff0; z-index:100; }
    canvas { display: block; }
    
    #ui { position: fixed; top:0; left:0; right:0; padding:20px; display:flex; justify-content:space-between; z-index:50; }
    .fighter-stats { width: 40%; }
    .name { font-size:1.5rem; color:#fff; margin-bottom:8px; text-shadow:2px 2px 0 #000; }
    .hp-bar { height:25px; background:#333; border:3px solid #fff; border-radius:5px; overflow:hidden; position:relative; }
    .hp-fill { height:100%; transition:width 0.2s; }
    .p1 .hp-fill { background:linear-gradient(90deg,#0f0,#ff0); }
    .p2 .hp-fill { background:linear-gradient(90deg,#f00,#ff0); float:right; }
    .hp-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-weight:bold; text-shadow:1px 1px 2px #000; }
    
    #timer { width:80px; height:80px; background:#111; border:4px solid #ff0; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#ff0; font-size:2.5rem; text-shadow:0 0 10px #ff0; position:absolute; left:50%; transform:translateX(-50%); }
    
    #combo { position:fixed; top:30%; left:50%; transform:translateX(-50%); font-size:3rem; color:#ff0; text-shadow:0 0 20px #f00, 3px 3px 0 #000; opacity:0; transition:opacity 0.1s; z-index:60; }
    #combo.show { opacity:1; }
    
    #message { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:5rem; color:#fff; text-shadow:0 0 30px #ff0, 5px 5px 0 #000; opacity:0; z-index:70; transition:opacity 0.3s; }
    #message.show { opacity:1; }
    
    #controls { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.7); font-size:0.85rem; text-align:center; z-index:50; }
    .key { display:inline-block; background:#333; padding:3px 10px; border-radius:5px; margin:2px; border:1px solid #666; }
    
    #gameover { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:80; }
    #gameover.show { display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #gameover h1 { font-size:5rem; color:#ff0; text-shadow:0 0 30px #ff0; margin-bottom:20px; }
    #gameover p { font-size:2rem; color:#fff; margin-bottom:30px; }
    #gameover button { padding:20px 50px; font-size:1.5rem; background:linear-gradient(135deg,#ff0,#f00); border:none; color:#000; font-weight:bold; cursor:pointer; border-radius:50px; }
  </style>
</head>
<body>
  <div id="loading">🥊 加载中...</div>
  
  <div id="ui">
    <div class="fighter-stats p1">
      <div class="name">🥷 玩家</div>
      <div class="hp-bar"><div class="hp-fill" id="p1hp" style="width:100%"></div><span class="hp-text" id="p1hptext">100</span></div>
    </div>
    <div id="timer">99</div>
    <div class="fighter-stats p2">
      <div class="name" style="text-align:right">👹 CPU</div>
      <div class="hp-bar"><div class="hp-fill" id="p2hp" style="width:100%"></div><span class="hp-text" id="p2hptext">100</span></div>
    </div>
  </div>
  
  <div id="combo"></div>
  <div id="message"></div>
  <div id="controls"><span class="key">A</span><span class="key">D</span> 移动 | <span class="key">J</span> 拳 | <span class="key">K</span> 踢 | <span class="key">L</span> 重击 | <span class="key">W</span> 跳跃</div>
  
  <div id="gameover">
    <h1 id="resultText">K.O.</h1>
    <p>最终得分: <span id="finalScore">0</span></p>
    <button onclick="restartGame()">再来一局</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let player, enemy;
    let timer = 99, timerInterval;
    let gameRunning = false;
    let score = 0, combo = 0, comboTimer = null;
    
    const p1 = { hp: 100, x: -3, y: 0, velX: 0, velY: 0, grounded: true, attacking: false, state: 'idle', animTimer: 0 };
    const p2 = { hp: 100, x: 3, y: 0, velX: 0, velY: 0, grounded: true, attacking: false, state: 'idle', aiTimer: 0 };
    
    const keys = {};
    
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a0a0a);
      scene.fog = new THREE.Fog(0x1a0a0a, 10, 50);
      
      camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
      camera.position.set(0, 4, 12);
      camera.lookAt(0, 2, 0);
      
      renderer = new THREE.WebGLRenderer({antialias:true});
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.insertBefore(renderer.domElement, document.body.firstChild);
      
      // 地板
      const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 20), new THREE.MeshStandardMaterial({color:0x2a1a1a}));
      floor.rotation.x = -Math.PI/2;
      floor.receiveShadow = true;
      scene.add(floor);
      
      // 背景柱子
      for (let i = 0; i < 5; i++) {
        const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1, 8, 8), new THREE.MeshStandardMaterial({color:0x3a2a2a, emissive:0x200, emissiveIntensity:0.3}));
        pillar.position.set(-12 + i * 6, 4, -8);
        pillar.castShadow = true;
        scene.add(pillar);
      }
      
      // 灯光
      scene.add(new THREE.AmbientLight(0x404040, 0.4));
      const spot = new THREE.SpotLight(0xffaa00, 1, 50, Math.PI/4, 0.5);
      spot.position.set(0, 15, 5);
      spot.castShadow = true;
      scene.add(spot);
      
      // 玩家和敌人
      player = createFighter(0x00ff88, 0x00cc66);
      player.position.set(-3, 0, 0);
      scene.add(player);
      
      enemy = createFighter(0xff4444, 0xcc2222);
      enemy.position.set(3, 0, 0);
      enemy.rotation.y = Math.PI;
      scene.add(enemy);
      
      // 事件
      document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
      document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
      window.addEventListener('resize', onResize);
      
      document.getElementById('loading').style.display = 'none';
      startGame();
    }
    
    function createFighter(mainColor, accentColor) {
      const g = new THREE.Group();
      
      // 身体 - 使用 Group 组合圆柱和球体
      const bodyGroup = new THREE.Group();
      
      // 躯干 (圆柱)
      const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.45, 1.0, 12), new THREE.MeshStandardMaterial({color:mainColor, emissive:mainColor, emissiveIntensity:0.2}));
      torso.castShadow = true;
      bodyGroup.add(torso);
      
      // 头部 (球体)
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshStandardMaterial({color:0xffccaa}));
      head.position.y = 0.8;
      head.castShadow = true;
      bodyGroup.add(head);
      
      // 眼睛
      const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({color:0x000000}));
      eyeL.position.set(-0.15, 0.85, 0.35);
      bodyGroup.add(eyeL);
      const eyeR = eyeL.clone();
      eyeR.position.x = 0.15;
      bodyGroup.add(eyeR);
      
      bodyGroup.position.y = 1.5;
      g.add(bodyGroup);
      g.userData.body = bodyGroup;
      
      // 手臂 (使用圆柱)
      const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.7, 8), new THREE.MeshStandardMaterial({color:mainColor}));
      armL.position.set(-0.65, 1.6, 0);
      armL.rotation.z = 0.3;
      g.add(armL);
      g.userData.armL = armL;
      
      const armR = armL.clone();
      armR.position.x = 0.65;
      armR.rotation.z = -0.3;
      g.add(armR);
      g.userData.armR = armR;
      
      // 腿
      const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.18, 0.8, 8), new THREE.MeshStandardMaterial({color:accentColor}));
      legL.position.set(-0.25, 0.4, 0);
      g.add(legL);
      g.userData.legL = legL;
      
      const legR = legL.clone();
      legR.position.x = 0.25;
      g.add(legR);
      g.userData.legR = legR;
      
      // 拳击手套
      const gloveL = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), new THREE.MeshStandardMaterial({color:0xff0000, emissive:0x440000, emissiveIntensity:0.3}));
      gloveL.position.set(-0.65, 2.0, 0.3);
      g.add(gloveL);
      g.userData.gloveL = gloveL;
      
      const gloveR = gloveL.clone();
      gloveR.position.x = 0.65;
      g.add(gloveR);
      g.userData.gloveR = gloveR;
      
      return g;
    }
    
    function startGame() {
      p1.hp = p2.hp = 100;
      p1.x = p2.x = 0;
      p1.state = p2.state = 'idle';
      timer = 99;
      score = 0;
      combo = 0;
      gameRunning = true;
      
      updateHP();
      document.getElementById('timer').textContent = timer;
      
      timerInterval = setInterval(() => {
        if (gameRunning && timer > 0) {
          timer--;
          document.getElementById('timer').textContent = timer;
          if (timer === 0) endGame();
        }
      }, 1000);
      
      animate();
    }
    
    function updateHP() {
      document.getElementById('p1hp').style.width = p1.hp + '%';
      document.getElementById('p1hptext').textContent = Math.ceil(p1.hp);
      document.getElementById('p2hp').style.width = p2.hp + '%';
      document.getElementById('p2hptext').textContent = Math.ceil(p2.hp);
    }
    
    function showCombo(count) {
      if (count < 2) return;
      const el = document.getElementById('combo');
      el.textContent = count + ' COMBO!';
      el.classList.add('show');
      clearTimeout(comboTimer);
      comboTimer = setTimeout(() => el.classList.remove('show'), 800);
    }
    
    function showMessage(text, color) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.style.color = color || '#ff0';
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 1200);
    }
    
    function checkHit(attacker, defender, damage, knockback) {
      const dx = defender.position.x - attacker.position.x;
      const inRange = Math.abs(dx) < 2.5;
      
      if (inRange) {
        defender.userData.hit = true;
        setTimeout(() => defender.userData.hit = false, 200);
        
        if (attacker === player) {
          p2.hp = Math.max(0, p2.hp - damage);
          combo++;
          score += damage * 10 + combo * 5;
          showCombo(combo);
          showMessage('HIT!', '#ff0');
        } else {
          p1.hp = Math.max(0, p1.hp - damage);
          combo = 0;
          showMessage('OUCH!', '#f00');
        }
        
        const kbDir = dx > 0 ? 1 : -1;
        if (attacker === player) p2.velX = kbDir * knockback;
        else p1.velX = -kbDir * knockback;
        
        updateHP();
        if (p1.hp <= 0 || p2.hp <= 0) endGame();
      }
    }
    
    function animateFighter(f, data, isPlayer) {
      const t = performance.now() * 0.003;
      
      if (data.state === 'idle') {
        f.userData.armL.rotation.z = 0.3 + Math.sin(t * 2) * 0.1;
        f.userData.armR.rotation.z = -0.3 - Math.sin(t * 2) * 0.1;
      }
      else if (data.state === 'walk') {
        f.userData.legL.rotation.x = Math.sin(t * 4) * 0.4;
        f.userData.legR.rotation.x = Math.sin(t * 4 + Math.PI) * 0.4;
      }
      else if (data.state === 'punch') {
        const progress = data.animTimer;
        f.userData.gloveL.position.z = 0.3 + Math.sin(progress * Math.PI) * 1.2;
        f.userData.gloveL.position.x = (isPlayer ? -0.65 : 0.65) + Math.sin(progress * Math.PI) * 0.8;
        if (progress > 0.3 && progress < 0.7 && !data.hitRegistered) {
          data.hitRegistered = true;
          checkHit(isPlayer ? player : enemy, isPlayer ? enemy : player, 8, 0.3);
        }
      }
      else if (data.state === 'kick') {
        const progress = data.animTimer;
        f.userData.legR.rotation.x = -Math.PI/3 * Math.sin(progress * Math.PI);
        if (progress > 0.3 && progress < 0.7 && !data.hitRegistered) {
          data.hitRegistered = true;
          checkHit(isPlayer ? player : enemy, isPlayer ? enemy : player, 15, 0.5);
        }
      }
      else if (data.state === 'heavy') {
        const progress = data.animTimer;
        f.userData.armL.rotation.z = -Math.PI/2 * Math.sin(progress * Math.PI);
        f.userData.armR.rotation.z = Math.PI/2 * Math.sin(progress * Math.PI);
        if (progress > 0.4 && progress < 0.8 && !data.hitRegistered) {
          data.hitRegistered = true;
          checkHit(isPlayer ? player : enemy, isPlayer ? enemy : player, 25, 1.2);
          showMessage('POW!', '#f0f');
        }
      }
      
      if (f.userData.hit) {
        f.userData.armL.rotation.z = 1.5;
        f.userData.armR.rotation.z = -1.5;
      }
    }
    
    function animate() {
      if (!gameRunning) return;
      requestAnimationFrame(animate);
      
      // 玩家
      if (!p1.attacking) {
        if (keys['a']) p1.velX = -0.12;
        else if (keys['d']) p1.velX = 0.12;
        
        if (keys['w'] && p1.grounded) { p1.velY = 0.35; p1.grounded = false; }
        
        if (keys['j']) { p1.state = 'punch'; p1.attacking = true; p1.animTimer = 0; p1.hitRegistered = false; }
        else if (keys['k']) { p1.state = 'kick'; p1.attacking = true; p1.animTimer = 0; p1.hitRegistered = false; }
        else if (keys['l']) { p1.state = 'heavy'; p1.attacking = true; p1.animTimer = 0; p1.hitRegistered = false; }
        
        if (!p1.attacking) p1.state = Math.abs(p1.velX) > 0.01 ? 'walk' : 'idle';
      } else {
        p1.animTimer += 0.08;
        if (p1.animTimer >= 1) { p1.attacking = false; p1.state = 'idle'; p1.hitRegistered = false; }
      }
      
      p1.velY -= 0.025;
      p1.x += p1.velX;
      p1.y += p1.velY;
      
      if (p1.y > 0) p1.grounded = false;
      if (p1.y <= 0) { p1.y = 0; p1.grounded = true; }
      p1.x = Math.max(-8, Math.min(8, p1.x));
      
      player.position.x = p1.x;
      player.position.y = p1.y;
      player.rotation.y = p1.x < p2.x ? 0 : Math.PI;
      
      // AI
      aiUpdate();
      
      animateFighter(player, p1, true);
      animateFighter(enemy, p2, false);
      
      renderer.render(scene, camera);
    }
    
    function aiUpdate() {
      if (p2.attacking) {
        p2.animTimer += 0.07;
        if (p2.animTimer >= 1) { p2.attacking = false; p2.state = 'idle'; p2.hitRegistered = false; }
        return;
      }
      
      p2.aiTimer++;
      const dist = Math.abs(p1.x - p2.x);
      
      if (dist > 2.5) {
        p2.velX = p1.x < p2.x ? -0.06 : 0.06;
        p2.state = 'walk';
      } else if (dist < 1.5) {
        p2.velX = p1.x < p2.x ? 0.04 : -0.04;
      } else {
        p2.velX *= 0.9;
        if (p2.aiTimer > 20) {
          const rand = Math.random();
          if (rand < 0.4) { p2.state = 'punch'; p2.attacking = true; p2.animTimer = 0; }
          else if (rand < 0.7) { p2.state = 'kick'; p2.attacking = true; p2.animTimer = 0; }
          else if (rand < 0.85 && p2.hp < 50) { p2.state = 'heavy'; p2.attacking = true; p2.animTimer = 0; }
          p2.aiTimer = 0;
        }
        if (!p2.attacking) p2.state = 'idle';
      }
      
      if (p1.attacking && Math.random() < 0.02 && p2.grounded) { p2.velY = 0.3; p2.grounded = false; }
      
      p2.velY -= 0.025;
      p2.x += p2.velX;
      p2.y += p2.velY;
      
      if (p2.y > 0) p2.grounded = false;
      if (p2.y <= 0) { p2.y = 0; p2.grounded = true; }
      p2.x = Math.max(-8, Math.min(8, p2.x));
      
      enemy.position.x = p2.x;
      enemy.position.y = p2.y;
      enemy.rotation.y = p2.x < p1.x ? 0 : Math.PI;
    }
    
    function endGame() {
      gameRunning = false;
      clearInterval(timerInterval);
      
      let result, color;
      if (p1.hp > p2.hp) { result = 'K.O. 你赢了!'; color = '#0f0'; }
      else if (p2.hp > p1.hp) { result = 'K.O. 你输了!'; color = '#f00'; }
      else { result = '平局!'; color = '#ff0'; }
      
      document.getElementById('resultText').textContent = result;
      document.getElementById('resultText').style.color = color;
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameover').classList.add('show');
    }
    
    window.restartGame = function() {
      document.getElementById('gameover').classList.remove('show');
      player.position.set(-3, 0, 0);
      enemy.position.set(3, 0, 0);
      enemy.rotation.y = Math.PI;
      startGame();
    };
    
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    init();
  </script>
</body>
</html>
